<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Web Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }
        header {
            padding: 60px 20px;
        }
        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: white;
            color: #333;
        }
        button:hover {
            opacity: 0.8;
        }
        footer {
            margin-top: 50px;
            padding: 20px;
            background-color: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<header>
    <h1>ようこそ！</h1>
    <p>これはGitHub Pages用のシンプルなサイトです。</p>
    <button onclick="alert('見に来てくれてありがとう！')">
        クリック
    </button>
</header>

<footer>
    © 2026 My Web Site
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>簡単なフォーム</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f9f9f9;
            text-align: center;
            padding-top: 50px;
        }
        form {
            background: white;
            display: inline-block;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 200px;
            margin: 10px 0;
            padding: 8px;
        }
        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>お問い合わせ</h1>

    <form onsubmit="alert('送信されました！'); return false;">
        <div>
            <input type="text" placeholder="お名前" required>
        </div>
        <div>
            <input type="email" placeholder="メールアドレス" required>
        </div>
        <div>
            <textarea placeholder="メッセージ" required></textarea>
        </div>
        <button type="submit">送信</button>
    </form>

</body>
</html>
